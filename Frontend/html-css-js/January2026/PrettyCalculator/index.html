<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    </link>
</head>

<body>
    <div class="container">
        <input id="inp" type="text" placeholder="0">
        <div>
            <button class="dButton">AC</button>
            <button class="dButton">DEL</button>
            <button class="dButton">%</button>
            <button class="dButton">/</button>
        </div>

        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="dButton">*</button>
        </div>

        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="dButton">-</button>
        </div>

        <div>
            <button>3</button>
            <button>2</button>
            <button>1</button>
            <button class="dButton">+</button>
        </div>

        <div>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="dButton">=</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
