<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
  <title>Profile Card 2</title>
</head>
<body>
  <main>
    <h1>Profile Card</h1>
    <div class="card">
      <h2>Monica Miles</h2>
      <img class="profilepic" width="300" height="300" src="images/monicamiles.png" alt="joseph image">
      <p class="role" href="#">Lead Frontend Developer</p>
      <p><span class="nowrap">Passionate about building beautiful web interfaces.</span> 10+ years in React, Vue, and UI engineering.</p>


      <div class="skill-links">
        <div class="skill-div">
          <span>React</span>
        </div>
        <div class="skill-div">
          <span>Vue</span>
        </div>
        <div class="skill-div">
          <span>UI/UX</span>
        </div>
        <div class="skill-div">
          <span>Figma</span>
        </div>
        <div class="skill-div">
          <span>Accessibility</span>
        </div>
      </div>
      
      <div class="social-links">
        <div class="social-div">
          <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
        <div class="social-div">
          <a href="#"><i class="fa-brands fa-twitter"></i></a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
