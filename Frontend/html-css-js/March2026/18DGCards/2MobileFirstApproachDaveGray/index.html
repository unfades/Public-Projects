<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Mini-Project: Profile Cards</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Our Staff</h1>
    <nav>

      <a href="#profile1">Joe</a>
      <a href="#profile2">Matt</a>
      <a href="#profile3">Jane</a>

    </nav>
  </header>

  <main>
    <article id="profile1" class="card">
      <figure>
        <img width="500" height="500" src="media/images/joe.png" alt="Joe Coder">
        <figcaption>Joe Coder</figcaption>
      </figure>
      <p><q>I code Stuff</q></p>
    </article>
    <article id="profile2" class="card">
      <figure>
        <img width="500" height="500" src="media/images/matt.png" alt="Matt Designer">
        <figcaption>Matt Designer</figcaption>
      </figure>
      <p><q>I design Stuff</q></p>
    </article>
    <article id="profile3" class="card">
      <figure>
        <img width="500" height="500" src="media/images/jane.png" alt="Jane Dev Rel">
        <figcaption>Jane <span class="nowrap">Dev Rel</span></figcaption>
      </figure>
      <p><q>I design Stuff</q></p>
    </article>
  </main>

  <footer>
    <h2>&copy;Acme Co.</h2>
  </footer>
</body>

</html>
