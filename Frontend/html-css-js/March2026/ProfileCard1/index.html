<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card 1</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <h1>Profile Card</h1>
    <div class="card">
      <h2>Joseph Klein</h2>
      <img class="profilepic" width="300" height="300" src="images/joeklien.png" alt="joseph image">
      <a href="#">CEO & Co-founder</a>
      <p>Former design lead at Figma with 15+ years of <span class="nowrap">experience in product design and UX
          Strategy.</span></p>
      <div class="social-links">
        <div class="social-div">
          <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
        <div class="social-div">
          <a href="#"><i class="fa-brands fa-twitter"></i></a>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
